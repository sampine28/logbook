<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Logbook">
<title>Logbook</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');
 
:root {
  --bg:      #141210;
  --surface: #1c1916;
  --surf2:   #242018;
  --border:  #2a2520;
  --border2: #332e28;
  --accent:  #f0c040;
  --text:    #e8dcc8;
  --muted:   #554e44;
  --muted2:  #7a6e5e;
  --danger:  #ff5540;
  --success: #6dcc7a;
  --warn:    #f0a030;
  --up:      #f0c040;
}
 
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100dvh; overflow-x: hidden; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
 
/* ── CHRONO BANNER ── */
#chrono-bar {
  position: sticky; top: 0; z-index: 60;
  background: var(--accent); color: #000;
  padding: 0 18px;
  display: flex; align-items: center; justify-content: space-between;
  overflow: hidden; max-height: 0; transition: max-height .3s ease, padding .3s ease;
}
#chrono-bar.visible { max-height: 44px; padding: 10px 18px; }
#chrono-time { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; }
#chrono-label { font-size: 11px; font-weight: 600; opacity: .7; }
#chrono-bar button { background: rgba(0,0,0,.15); border: none; border-radius: 6px; padding: 4px 10px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; color: #000; }
 
/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg); border-bottom: 1px solid var(--border);
  padding: 13px 18px 10px;
  display: flex; align-items: center; justify-content: space-between;
}
header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 27px; letter-spacing: 2px; color: var(--accent); }
.hdr-r { text-align: right; }
.hdr-date { font-size: 12px; color: var(--muted2); }
.hdr-streak { font-size: 11px; color: var(--accent); font-weight: 600; }
 
/* ── NAV ── */
nav {
  display: flex; border-bottom: 1px solid var(--border);
  background: var(--bg); position: sticky; top: 52px; z-index: 40;
}
nav button {
  flex: 1; background: none; border: none; color: var(--muted2);
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
  padding: 11px 0; cursor: pointer; text-transform: uppercase; letter-spacing: .7px;
  border-bottom: 2px solid transparent; transition: color .15s, border-color .15s;
}
nav button.active { color: var(--accent); border-bottom-color: var(--accent); }
 
/* ── VIEWS ── */
.view { display: none; padding: 14px 14px 110px; }
.view.active { display: block; }
 
/* ── OVERLOAD BANNER ── */
.ob { border-radius: 10px; padding: 10px 12px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 9px; }
.ob.up    { background: rgba(240,192,64,.09);  border: 1px solid rgba(240,192,64,.25); color: var(--accent); }
.ob.ok    { background: rgba(109,204,122,.07); border: 1px solid rgba(109,204,122,.2); color: var(--success); }
.ob.first { background: rgba(240,160,48,.07);  border: 1px solid rgba(240,160,48,.2);  color: var(--warn); }
.ob-ico   { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.ob strong { display: block; font-size: 12px; font-weight: 700; }
.ob small  { font-size: 11px; opacity: .75; display: block; margin-top: 1px; }
 
/* ── EXERCISE CARD ── */
.ex-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 11px; overflow: hidden; }
.ex-hdr  { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; }
.ex-name { font-weight: 600; font-size: 15px; color: var(--text); }
.ex-sub  { font-size: 11px; color: var(--muted2); margin-top: 2px; }
.ex-hdr-r { display: flex; align-items: center; gap: 6px; }
.ex-del  { background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; padding: 4px 6px; }
.ex-chev { color: var(--muted2); font-size: 20px; transition: transform .2s; display: inline-block; }
.ex-card.open .ex-chev { transform: rotate(90deg); }
.sets-body { display: none; padding: 0 14px 14px; }
.ex-card.open .sets-body { display: block; }
 
/* ── SET ROW ── */
.col-lbls { display: grid; grid-template-columns: 24px 1fr 1fr 34px 34px; gap: 6px; padding: 2px 0 6px; }
.col-lbl  { font-size: 10px; color: var(--muted2); text-align: center; text-transform: uppercase; letter-spacing: .5px; }
.set-row  { display: grid; grid-template-columns: 24px 1fr 1fr 34px 34px; gap: 6px; align-items: center; padding: 5px 0; border-top: 1px solid var(--border); }
.set-n    { font-size: 11px; color: var(--muted2); text-align: center; font-weight: 500; }
 
/* ── STEPPER ── */
.stpr { display: flex; align-items: center; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; height: 38px; }
.stpr-btn { background: none; border: none; color: var(--text); font-size: 20px; font-weight: 300; width: 34px; height: 38px; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; flex-shrink: 0; }
.stpr-btn:active { background: var(--surf2); }
.stpr-in  { flex: 1; text-align: center; font-size: 14px; font-weight: 600; color: var(--text); border: none; background: none; height: 38px; padding: 0; width: 100%; }
.stpr-in:focus { outline: none; color: var(--accent); }
.prev-hint { font-size: 10px; color: var(--muted); text-align: center; margin-top: 2px; }
 
/* ── DONE + TIMER BTNS ── */
.done-btn  { width: 32px; height: 32px; border-radius: 7px; border: 2px solid var(--border2); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: transparent; margin: 0 auto; transition: all .12s; }
.done-btn.done { background: var(--accent); border-color: var(--accent); color: #000; }
.timer-btn { width: 32px; height: 32px; border-radius: 7px; border: 1px solid var(--border2); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--muted2); margin: 0 auto; transition: all .12s; }
.timer-btn:active { background: var(--surf2); }
 
/* ── ADD SET ── */
.add-set-row { display: flex; gap: 8px; margin-top: 10px; }
.add-set-btn { flex: 1; background: none; border: 1px dashed var(--border2); border-radius: 8px; color: var(--muted2); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 8px; cursor: pointer; }
.add-set-btn:active { border-color: var(--accent); color: var(--accent); }
.del-set-btn { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted2); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 8px 13px; cursor: pointer; }
 
/* ── FAB ── */
.fab-area { position: fixed; bottom: 0; left: 0; right: 0; padding: 10px 14px 30px; background: linear-gradient(to top, var(--bg) 60%, transparent); display: flex; gap: 10px; }
.fab { flex: 1; border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; padding: 15px; cursor: pointer; transition: transform .1s; }
.fab:active { transform: scale(.97); }
.fab-p { background: var(--accent); color: #000; }
.fab-s { background: var(--surface); color: var(--text); border: 1px solid var(--border2); }
 
/* ── MODALS ── */
.modal-ov { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,.8); backdrop-filter: blur(6px); align-items: flex-end; }
.modal-ov.open { display: flex; }
.modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 22px 16px 40px; width: 100%; border-top: 1px solid var(--border2); animation: slideUp .22s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal h3 { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1.5px; color: var(--accent); margin-bottom: 14px; }
.modal input, .modal select, .modal textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border2);
  border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 15px; padding: 12px 14px; margin-bottom: 10px;
}
.modal input:focus, .modal select:focus, .modal textarea:focus { outline: none; border-color: var(--accent); }
.modal textarea { resize: none; height: 70px; font-size: 13px; }
.quick-grid { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 12px; }
.q-chip { background: var(--surf2); border: 1px solid var(--border2); border-radius: 20px; padding: 6px 13px; font-size: 12px; color: var(--text); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .12s; }
.q-chip.sel, .q-chip:active { background: var(--accent); color: #000; border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; margin-top: 4px; }
 
/* ── TEMPLATES VIEW ── */
.tpl-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 11px; overflow: hidden; }
.tpl-hdr  { display: flex; align-items: center; justify-content: space-between; padding: 13px 14px; cursor: pointer; }
.tpl-name { font-weight: 600; font-size: 15px; color: var(--text); }
.tpl-sub  { font-size: 11px; color: var(--muted2); margin-top: 2px; }
.tpl-hdr-r { display: flex; align-items: center; gap: 8px; }
.tpl-load-btn { background: var(--accent); border: none; border-radius: 8px; color: #000; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700; padding: 6px 12px; cursor: pointer; }
.tpl-edit-btn { background: none; border: 1px solid var(--border2); border-radius: 8px; color: var(--muted2); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 6px 10px; cursor: pointer; }
.tpl-del-btn  { background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; padding: 4px; }
.tpl-body { display: none; padding: 0 14px 14px; border-top: 1px solid var(--border); }
.tpl-card.open .tpl-body { display: block; }
.tpl-ex-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); }
.tpl-ex-name { font-size: 13px; font-weight: 500; color: var(--text); }
.tpl-ex-meta { font-size: 11px; color: var(--muted2); }
.tpl-ex-del  { background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; }
 
/* ── HISTORY / STATS ── */
.h-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
.h-card-hdr { padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.h-card-date { font-weight: 600; font-size: 14px; color: var(--text); }
.h-card-meta { font-size: 11px; color: var(--muted2); }
.h-card-body { display: none; padding: 10px 14px 14px; border-top: 1px solid var(--border); }
.h-card.open .h-card-body { display: block; }
.h-ex { margin-bottom: 12px; }
.h-ex-name { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.h-ex-name:hover { opacity: .8; }
.h-ex-name .see-prog { font-size: 10px; color: var(--muted2); font-weight: 400; text-transform: none; letter-spacing: 0; }
.h-set { font-size: 13px; color: var(--muted2); margin: 3px 0; display: flex; align-items: center; gap: 6px; }
.h-set b { color: var(--text); }
.pr-tag { background: var(--accent); color: #000; font-size: 9px; font-weight: 800; padding: 2px 5px; border-radius: 4px; letter-spacing: .5px; }
.h-del-btn { margin-top: 8px; background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted2); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 6px 12px; cursor: pointer; }
 
/* Progression inline */
.prog-inline { background: var(--surf2); border-radius: 10px; padding: 12px; margin-top: 10px; }
.prog-ttl { font-size: 11px; color: var(--muted2); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; display: flex; justify-content: space-between; }
.prog-ttl span { color: var(--accent); font-size: 12px; font-weight: 700; text-transform: none; letter-spacing: 0; }
.prog-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; border-top: 1px solid var(--border); }
.prog-date { font-size: 10px; color: var(--muted2); width: 70px; flex-shrink: 0; }
.prog-bar-w { flex: 1; height: 4px; background: var(--border2); border-radius: 3px; overflow: hidden; }
.prog-bar { height: 100%; background: var(--accent); border-radius: 3px; }
.prog-v { font-size: 12px; font-weight: 600; color: var(--text); width: 48px; text-align: right; flex-shrink: 0; }
 
/* MISC */
.empty { text-align: center; padding: 50px 20px; color: var(--muted2); font-size: 14px; }
.empty .ico { font-size: 36px; margin-bottom: 10px; }
.section-title { font-size: 11px; color: var(--muted2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
 
#toast { position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--accent); color: #000; font-weight: 700; font-size: 13px; padding: 10px 22px; border-radius: 22px; opacity: 0; transition: all .25s; z-index: 300; pointer-events: none; white-space: nowrap; }
 
/* CHRONO DURATION PICKER */
.chrono-opts { display: flex; gap: 8px; margin-bottom: 12px; }
.chrono-opt { flex: 1; background: var(--surf2); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; padding: 8px; cursor: pointer; text-align: center; transition: all .12s; }
.chrono-opt.sel { background: var(--accent); color: #000; border-color: var(--accent); }
</style>
</head>
<body>
 
<!-- CHRONO BAR -->
<div id="chrono-bar">
  <div>
    <div id="chrono-time">1:30</div>
    <div id="chrono-label">Repos en cours…</div>
  </div>
  <button onclick="stopChrono()">Stop</button>
</div>
 
<header>
  <h1>LOGBOOK</h1>
  <div class="hdr-r">
    <div class="hdr-date" id="hdrDate"></div>
    <div class="hdr-streak" id="hdrStreak"></div>
  </div>
</header>
 
<nav>
  <button class="active" onclick="switchTab('session',this)">Session</button>
  <button onclick="switchTab('templates',this)">Templates</button>
  <button onclick="switchTab('history',this)">Historique</button>
</nav>
 
<!-- SESSION -->
<div class="view active" id="view-session">
  <div id="exList"></div>
  <div class="fab-area">
    <button class="fab fab-s" onclick="openAddEx()">+ Exercice</button>
    <button class="fab fab-p" onclick="saveSession()">Sauvegarder ✓</button>
  </div>
</div>
 
<!-- TEMPLATES -->
<div class="view" id="view-templates">
  <div id="tplList"></div>
  <div class="fab-area">
    <button class="fab fab-p" onclick="openNewTpl()">+ Nouveau template</button>
  </div>
</div>
 
<!-- HISTORY -->
<div class="view" id="view-history">
  <div id="historyList"></div>
</div>
 
<!-- MODAL : add exercise to session -->
<div class="modal-ov" id="modalAddEx" onclick="maybeClose(event,'modalAddEx')">
  <div class="modal">
    <h3>Ajouter un exercice</h3>
    <div class="quick-grid" id="quickGrid"></div>
    <input type="text" id="exNameIn" placeholder="Ou saisir un nom…" autocomplete="off" list="exDatalist">
    <datalist id="exDatalist"></datalist>
    <input type="number" id="exSetsIn" placeholder="Nb de séries (défaut : 3)" inputmode="numeric" min="1" max="10">
    <div class="modal-btns">
      <button class="fab fab-s" style="padding:13px" onclick="closeModal('modalAddEx')">Annuler</button>
      <button class="fab fab-p" style="padding:13px" onclick="confirmAddEx()">Ajouter</button>
    </div>
  </div>
</div>
 
<!-- MODAL : new/edit template -->
<div class="modal-ov" id="modalTpl" onclick="maybeClose(event,'modalTpl')">
  <div class="modal" style="padding-bottom:50px">
    <h3 id="tplModalTitle">Nouveau template</h3>
    <input type="text" id="tplNameIn" placeholder="Nom du template (ex: Haut A)">
    <div id="tplExList" style="margin-bottom:10px"></div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input type="text" id="tplExNameIn" placeholder="Ajouter un exercice…" style="margin:0;flex:1" list="exDatalist2">
      <datalist id="exDatalist2"></datalist>
      <input type="number" id="tplExSetsIn" placeholder="Séries" inputmode="numeric" min="1" max="10" style="margin:0;width:80px">
      <button class="fab fab-s" style="flex:0;padding:10px 14px;font-size:18px" onclick="addExToTpl()">+</button>
    </div>
    <div class="modal-btns">
      <button class="fab fab-s" style="padding:13px" onclick="closeModal('modalTpl')">Annuler</button>
      <button class="fab fab-p" style="padding:13px" onclick="saveTpl()">Enregistrer</button>
    </div>
  </div>
</div>
 
<!-- MODAL : chrono duration picker -->
<div class="modal-ov" id="modalChrono" onclick="maybeClose(event,'modalChrono')">
  <div class="modal">
    <h3>Temps de repos</h3>
    <div class="chrono-opts">
      <div class="chrono-opt" onclick="pickChrono(60,this)">1 min</div>
      <div class="chrono-opt sel" onclick="pickChrono(90,this)">1:30</div>
      <div class="chrono-opt" onclick="pickChrono(120,this)">2 min</div>
      <div class="chrono-opt" onclick="pickChrono(180,this)">3 min</div>
    </div>
    <button class="fab fab-p" style="width:100%;padding:14px" onclick="startChronoFromModal()">Lancer</button>
  </div>
</div>
 
<div id="toast"></div>
 
<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const W_STEP = 2.5, R_STEP = 1, TARGET_REPS = 12;
const COMMON = ['Développé couché','Squat','Soulevé de terre','Tractions','Rowing barre','OHP','Curl biceps','Triceps poulie','Leg press','Fentes','Développé incliné','Pec deck'];
 
// ── STATE ───────────────────────────────────────────────────────────────────
let sessions   = JSON.parse(localStorage.getItem('lb_sess')  || '[]');
let templates  = JSON.parse(localStorage.getItem('lb_tpl')   || '[]');
let cur        = null;
let editTplIdx = null; // null = new, number = editing
let tplExercises = []; // temp list while editing a template
let chronoSec  = 90, chronoRemain = 0, chronoTimer = null;
 
function save()  { localStorage.setItem('lb_sess', JSON.stringify(sessions)); }
function saveTpls() { localStorage.setItem('lb_tpl', JSON.stringify(templates)); }
function todayStr() { return new Date().toLocaleDateString('fr-FR'); }
function norm(s) { return (s||'').trim().toLowerCase(); }
 
function init() {
  document.getElementById('hdrDate').textContent = todayStr();
  updateStreak();
  const ex = sessions.find(s => s.date === todayStr());
  cur = ex ? JSON.parse(JSON.stringify(ex)) : { date: todayStr(), exercises: [] };
  renderSession();
  populateLists();
}
 
// ── OVERLOAD ────────────────────────────────────────────────────────────────
function lastEx(name) {
  for (const s of sessions) {
    if (s.date === todayStr()) continue;
    const ex = s.exercises.find(e => norm(e.name) === norm(name));
    if (ex) return ex;
  }
  return null;
}
 
function advice(name) {
  const last = lastEx(name);
  if (!last) return { type:'first', title:'Premier enregistrement', detail:'Note tes séries pour commencer ta progression !' };
  const avgR = last.sets.reduce((a,s)=>a+(s.reps||0),0) / (last.sets.length||1);
  const maxW  = Math.max(...last.sets.map(s=>s.weight||0));
  if (avgR >= TARGET_REPS) return { type:'up', title:`↑ Augmente · essaie ${maxW+W_STEP} kg`, detail:`Tu as tenu ${Math.round(avgR)} reps en moy. — charge !`, targetW:maxW+W_STEP, targetR:Math.round(avgR)-2 };
  return { type:'ok', title:`→ Même poids, vise ${Math.round(avgR)+1} reps`, detail:`Dernière fois : ${maxW} kg × ${Math.round(avgR)} reps`, targetW:maxW, targetR:Math.round(avgR)+1 };
}
 
// ── RENDER SESSION ───────────────────────────────────────────────────────────
function renderSession() {
  const el = document.getElementById('exList');
  if (!cur.exercises.length) {
    el.innerHTML = `<div class="empty"><div class="ico">💪</div>Ajoute un exercice ou charge un template !</div>`;
    return;
  }
  el.innerHTML = cur.exercises.map((ex,ei) => buildCard(ex,ei)).join('');
}
 
function buildCard(ex, ei) {
  const adv  = advice(ex.name);
  const done = ex.sets.filter(s=>s.done).length;
  const lastSets = lastEx(ex.name)?.sets || [];
 
  const banner = `<div class="ob ${adv.type}">
    <div class="ob-ico">${adv.type==='up'?'🔼':adv.type==='ok'?'✅':'🆕'}</div>
    <div><strong>${adv.title}</strong><small>${adv.detail}</small></div>
  </div>`;
 
  const rows = ex.sets.map((s,si) => {
    const prev = lastSets[si];
    return `<div class="set-row" id="sr-${ei}-${si}">
      <div class="set-n">${si+1}</div>
      <div>
        <div class="stpr">
          <button class="stpr-btn" onclick="adj(${ei},${si},'w',-1)">−</button>
          <input class="stpr-in" type="number" inputmode="decimal" value="${s.weight||0}"
            onchange="setV(${ei},${si},'w',+this.value)" onfocus="this.select()">
          <button class="stpr-btn" onclick="adj(${ei},${si},'w',+1)">+</button>
        </div>
        ${prev?`<div class="prev-hint">${prev.weight}kg</div>`:''}
      </div>
      <div>
        <div class="stpr">
          <button class="stpr-btn" onclick="adj(${ei},${si},'r',-1)">−</button>
          <input class="stpr-in" type="number" inputmode="numeric" value="${s.reps||0}"
            onchange="setV(${ei},${si},'r',+this.value)" onfocus="this.select()">
          <button class="stpr-btn" onclick="adj(${ei},${si},'r',+1)">+</button>
        </div>
        ${prev?`<div class="prev-hint">${prev.reps}rep</div>`:''}
      </div>
      <button class="timer-btn" onclick="openChrono()" title="Repos">⏱</button>
      <button class="done-btn ${s.done?'done':''}" onclick="toggleDone(${ei},${si})">✓</button>
    </div>`;
  }).join('');
 
  return `<div class="ex-card ${ex.open!==false?'open':''}" id="ec-${ei}">
    <div class="ex-hdr" onclick="togEx(${ei})">
      <div>
        <div class="ex-name">${ex.name}</div>
        <div class="ex-sub">${done}/${ex.sets.length} séries · ${bestStr(ex)}</div>
      </div>
      <div class="ex-hdr-r">
        <button class="ex-del" onclick="event.stopPropagation();delEx(${ei})">✕</button>
        <span class="ex-chev">›</span>
      </div>
    </div>
    <div class="sets-body">
      ${banner}
      <div class="col-lbls">
        <div class="col-lbl"></div>
        <div class="col-lbl">Kg</div>
        <div class="col-lbl">Reps</div>
        <div class="col-lbl">⏱</div>
        <div class="col-lbl">✓</div>
      </div>
      ${rows}
      <div class="add-set-row">
        <button class="add-set-btn" onclick="addSet(${ei})">+ Série</button>
        <button class="del-set-btn" onclick="delSet(${ei})">−</button>
      </div>
    </div>
  </div>`;
}
 
function bestStr(ex) {
  const s = ex.sets.filter(s=>s.weight||s.reps);
  if (!s.length) return '—';
  const b = s.reduce((a,b)=>((a.weight||0)*(a.reps||0)>(b.weight||0)*(b.reps||0)?a:b));
  return `${b.weight||0} kg × ${b.reps||0} reps`;
}
 
function togEx(ei) {
  const card = document.getElementById(`ec-${ei}`);
  card.classList.toggle('open');
  cur.exercises[ei].open = card.classList.contains('open');
}
 
function adj(ei, si, field, dir) {
  const step = field==='w'?W_STEP:R_STEP;
  const key  = field==='w'?'weight':'reps';
  const val  = Math.max(0, Math.round(((cur.exercises[ei].sets[si][key]||0)+dir*step)*10)/10);
  cur.exercises[ei].sets[si][key] = val;
  const row = document.getElementById(`sr-${ei}-${si}`);
  row.querySelectorAll('.stpr-in')[field==='w'?0:1].value = val;
  refreshSub(ei);
}
 
function setV(ei, si, field, val) {
  cur.exercises[ei].sets[si][field==='w'?'weight':'reps'] = Math.max(0, val);
  refreshSub(ei);
}
 
function refreshSub(ei) {
  const ex = cur.exercises[ei];
  const done = ex.sets.filter(s=>s.done).length;
  document.querySelector(`#ec-${ei} .ex-sub`).textContent = `${done}/${ex.sets.length} séries · ${bestStr(ex)}`;
}
 
function toggleDone(ei, si) {
  cur.exercises[ei].sets[si].done = !cur.exercises[ei].sets[si].done;
  document.querySelector(`#sr-${ei}-${si} .done-btn`).classList.toggle('done', cur.exercises[ei].sets[si].done);
  refreshSub(ei);
  if (navigator.vibrate) navigator.vibrate(25);
}
 
function addSet(ei) {
  const s = cur.exercises[ei].sets;
  s.push(s.length?{...s[s.length-1],done:false}:{weight:0,reps:0,done:false});
  const open = document.getElementById(`ec-${ei}`).classList.contains('open');
  renderSession();
  if (open) document.getElementById(`ec-${ei}`)?.classList.add('open');
}
 
function delSet(ei) {
  if (cur.exercises[ei].sets.length > 1) {
    cur.exercises[ei].sets.pop();
    const open = document.getElementById(`ec-${ei}`).classList.contains('open');
    renderSession();
    if (open) document.getElementById(`ec-${ei}`)?.classList.add('open');
  }
}
 
function delEx(ei) { cur.exercises.splice(ei,1); renderSession(); }
 
// ── SAVE SESSION ─────────────────────────────────────────────────────────────
function saveSession() {
  const idx = sessions.findIndex(s=>s.date===cur.date);
  const copy = JSON.parse(JSON.stringify(cur));
  if (idx!==-1) sessions[idx]=copy; else sessions.unshift(copy);
  save(); populateLists(); updateStreak();
  showToast('✓ Session sauvegardée');
}
 
// ── ADD EXERCISE MODAL ────────────────────────────────────────────────────────
function openAddEx() {
  document.getElementById('exNameIn').value='';
  document.getElementById('exSetsIn').value='';
  const used = new Set(cur.exercises.map(e=>norm(e.name)));
  const hist = [...new Set(sessions.flatMap(s=>s.exercises.map(e=>e.name)))];
  const chips = [...new Set([...hist,...COMMON])].filter(n=>!used.has(norm(n))).slice(0,12);
  document.getElementById('quickGrid').innerHTML = chips.map(n=>
    `<div class="q-chip" onclick="pickChip(this,'${n.replace(/'/g,"\\'")}','exNameIn')">${n}</div>`
  ).join('');
  openModal('modalAddEx');
}
 
function confirmAddEx() {
  const name = document.getElementById('exNameIn').value.trim();
  if (!name) { document.getElementById('exNameIn').focus(); return; }
  const n = parseInt(document.getElementById('exSetsIn').value)||3;
  const adv = advice(name);
  const last = lastEx(name)?.sets||[];
  const sets = [];
  for (let i=0;i<n;i++) {
    let w=0,r=0;
    if (adv.targetW!==undefined){w=adv.targetW;r=adv.targetR||0;}
    else if(last[i]){w=last[i].weight;r=last[i].reps;}
    sets.push({weight:w,reps:r,done:false});
  }
  cur.exercises.push({name,sets,open:true});
  closeModal('modalAddEx'); renderSession();
}
 
// ── TEMPLATES ────────────────────────────────────────────────────────────────
function renderTemplates() {
  const el = document.getElementById('tplList');
  if (!templates.length) {
    el.innerHTML = `<div class="empty"><div class="ico">📋</div>Aucun template — crée ton premier programme !</div>`;
    return;
  }
  el.innerHTML = templates.map((t,ti) => `
    <div class="tpl-card" id="tc-${ti}">
      <div class="tpl-hdr" onclick="togTpl(${ti})">
        <div>
          <div class="tpl-name">${t.name}</div>
          <div class="tpl-sub">${t.exercises.length} exercice${t.exercises.length>1?'s':''}</div>
        </div>
        <div class="tpl-hdr-r">
          <button class="tpl-load-btn" onclick="event.stopPropagation();loadTemplate(${ti})">Charger</button>
          <button class="tpl-edit-btn" onclick="event.stopPropagation();openEditTpl(${ti})">Éditer</button>
          <button class="tpl-del-btn" onclick="event.stopPropagation();delTpl(${ti})">✕</button>
        </div>
      </div>
      <div class="tpl-body">
        ${t.exercises.map((ex,ei)=>`
          <div class="tpl-ex-row">
            <div>
              <div class="tpl-ex-name">${ex.name}</div>
              <div class="tpl-ex-meta">${ex.sets} séries</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}
 
function togTpl(i) { document.getElementById(`tc-${i}`).classList.toggle('open'); }
 
function loadTemplate(ti) {
  const tpl = templates[ti];
  const confirmLoad = cur.exercises.length > 0;
  if (confirmLoad && !confirm(`Remplacer la session en cours par "${tpl.name}" ?`)) return;
  cur.exercises = tpl.exercises.map(ex => {
    const adv = advice(ex.name);
    const last = lastEx(ex.name)?.sets||[];
    const sets = [];
    for (let i=0;i<ex.sets;i++) {
      let w=0,r=0;
      if(adv.targetW!==undefined){w=adv.targetW;r=adv.targetR||0;}
      else if(last[i]){w=last[i].weight;r=last[i].reps;}
      sets.push({weight:w,reps:r,done:false});
    }
    return {name:ex.name, sets, open:false};
  });
  switchTab('session', document.querySelector('nav button'));
  renderSession();
  showToast(`✓ Template "${tpl.name}" chargé`);
}
 
function openNewTpl() {
  editTplIdx = null;
  tplExercises = [];
  document.getElementById('tplNameIn').value = '';
  document.getElementById('tplExNameIn').value = '';
  document.getElementById('tplExSetsIn').value = '';
  document.getElementById('tplModalTitle').textContent = 'Nouveau template';
  renderTplExList();
  populateLists();
  openModal('modalTpl');
}
 
function openEditTpl(ti) {
  editTplIdx = ti;
  const t = templates[ti];
  tplExercises = t.exercises.map(e=>({...e}));
  document.getElementById('tplNameIn').value = t.name;
  document.getElementById('tplExNameIn').value = '';
  document.getElementById('tplExSetsIn').value = '';
  document.getElementById('tplModalTitle').textContent = 'Éditer le template';
  renderTplExList();
  populateLists();
  openModal('modalTpl');
}
 
function addExToTpl() {
  const name = document.getElementById('tplExNameIn').value.trim();
  const sets = parseInt(document.getElementById('tplExSetsIn').value)||3;
  if (!name) { document.getElementById('tplExNameIn').focus(); return; }
  tplExercises.push({name, sets});
  document.getElementById('tplExNameIn').value = '';
  document.getElementById('tplExSetsIn').value = '';
  renderTplExList();
}
 
function renderTplExList() {
  document.getElementById('tplExList').innerHTML = tplExercises.length
    ? tplExercises.map((ex,i)=>`
        <div class="tpl-ex-row">
          <div><div class="tpl-ex-name">${ex.name}</div><div class="tpl-ex-meta">${ex.sets} séries</div></div>
          <button class="tpl-ex-del" onclick="removeTplEx(${i})">✕</button>
        </div>`).join('')
    : `<div style="font-size:12px;color:var(--muted2);padding:8px 0">Aucun exercice ajouté.</div>`;
}
 
function removeTplEx(i) { tplExercises.splice(i,1); renderTplExList(); }
 
function saveTpl() {
  const name = document.getElementById('tplNameIn').value.trim();
  if (!name) { document.getElementById('tplNameIn').focus(); return; }
  if (!tplExercises.length) { showToast('Ajoute au moins un exercice'); return; }
  const tpl = { name, exercises: tplExercises };
  if (editTplIdx !== null) templates[editTplIdx] = tpl;
  else templates.unshift(tpl);
  saveTpls();
  closeModal('modalTpl');
  renderTemplates();
  showToast('✓ Template enregistré');
}
 
function delTpl(ti) {
  templates.splice(ti,1);
  saveTpls();
  renderTemplates();
}
 
// ── HISTORY + STATS ──────────────────────────────────────────────────────────
function renderHistory() {
  const el = document.getElementById('historyList');
  if (!sessions.length) { el.innerHTML=`<div class="empty"><div class="ico">📋</div>Aucune session encore.</div>`; return; }
  el.innerHTML = sessions.map((s,si)=>`
    <div class="h-card" id="hc-${si}">
      <div class="h-card-hdr" onclick="togHC(${si})">
        <div class="h-card-date">${s.date}</div>
        <div class="h-card-meta">${s.exercises.length} exercice${s.exercises.length>1?'s':''} · ${totVol(s)} kg vol.</div>
      </div>
      <div class="h-card-body">
        ${s.exercises.map((ex,ei)=>`
          <div class="h-ex">
            <div class="h-ex-name" onclick="toggleProg('prog-${si}-${ei}','${ex.name.replace(/'/g,"\\'")}')">
              ${ex.name} <span class="see-prog">↗ progression</span>
            </div>
            ${ex.sets.map(st=>{
              const pr=isPR(ex.name,st,s.date);
              return `<div class="h-set"><b>${st.weight||0} kg × ${st.reps||0}</b>${pr?'<span class="pr-tag">PR</span>':''}</div>`;
            }).join('')}
            <div id="prog-${si}-${ei}" style="display:none"></div>
          </div>`).join('')}
        <button class="h-del-btn" onclick="delSess(${si})">Supprimer la session</button>
      </div>
    </div>`).join('');
}
 
function togHC(i) { document.getElementById(`hc-${i}`).classList.toggle('open'); }
 
function toggleProg(id, name) {
  const el = document.getElementById(id);
  if (el.style.display !== 'none') { el.style.display='none'; return; }
  const entries=[];
  for (const s of [...sessions].reverse()) {
    const ex=s.exercises.find(e=>norm(e.name)===norm(name));
    if(!ex) continue;
    const maxW=Math.max(...ex.sets.map(s=>s.weight||0));
    entries.push({date:s.date,maxW});
  }
  if (!entries.length) return;
  const bestW=Math.max(...entries.map(e=>e.maxW));
  const last=entries[entries.length-1], prev=entries[entries.length-2];
  const delta=prev?last.maxW-prev.maxW:0;
  el.innerHTML=`<div class="prog-inline">
    <div class="prog-ttl">Progression <span>${delta>0?'+':''}${delta} kg vs préc.</span></div>
    ${entries.map(e=>`
      <div class="prog-row">
        <div class="prog-date">${e.date}</div>
        <div class="prog-bar-w"><div class="prog-bar" style="width:${bestW?e.maxW/bestW*100:0}%"></div></div>
        <div class="prog-v">${e.maxW} kg</div>
      </div>`).join('')}
  </div>`;
  el.style.display='block';
}
 
function delSess(i) {
  sessions.splice(i,1); save(); renderHistory(); populateLists();
}
 
function totVol(s) { return Math.round(s.exercises.reduce((a,ex)=>a+ex.sets.reduce((b,st)=>b+(st.weight||0)*(st.reps||0),0),0)); }
 
function isPR(name,set,date) {
  const vol=(set.weight||0)*(set.reps||0);
  if (!vol) return false;
  for (const s of sessions) {
    if (s.date===date) continue;
    for (const ex of s.exercises) {
      if (norm(ex.name)===norm(name)) {
        for (const st of ex.sets) { if((st.weight||0)*(st.reps||0)>=vol) return false; }
      }
    }
  }
  return true;
}
 
// ── CHRONO ───────────────────────────────────────────────────────────────────
function openChrono() {
  document.querySelectorAll('.chrono-opt').forEach(o=>o.classList.remove('sel'));
  document.querySelectorAll('.chrono-opt').forEach(o=>{ if(o.textContent.trim()==='1:30') o.classList.add('sel'); });
  chronoSec = 90;
  openModal('modalChrono');
}
 
function pickChrono(sec, el) {
  chronoSec = sec;
  document.querySelectorAll('.chrono-opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
}
 
function startChronoFromModal() {
  closeModal('modalChrono');
  startChrono(chronoSec);
}
 
function startChrono(sec) {
  if (chronoTimer) clearInterval(chronoTimer);
  chronoRemain = sec;
  const bar = document.getElementById('chrono-bar');
  bar.classList.add('visible');
  updateChronoDisplay();
  chronoTimer = setInterval(() => {
    chronoRemain--;
    if (chronoRemain <= 0) {
      stopChrono();
      if (navigator.vibrate) navigator.vibrate([100,50,100,50,200]);
      showToast('C\'est parti ! 💪');
    } else {
      updateChronoDisplay();
    }
  }, 1000);
}
 
function updateChronoDisplay() {
  const m = Math.floor(chronoRemain/60);
  const s = chronoRemain%60;
  document.getElementById('chrono-time').textContent = `${m}:${String(s).padStart(2,'0')}`;
  document.getElementById('chrono-label').textContent = chronoRemain > 0 ? 'Repos en cours…' : 'C\'est parti !';
}
 
function stopChrono() {
  if (chronoTimer) { clearInterval(chronoTimer); chronoTimer=null; }
  document.getElementById('chrono-bar').classList.remove('visible');
}
 
// ── UTILS ────────────────────────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function maybeClose(e,id) { if(e.target===document.getElementById(id)) closeModal(id); }
 
function pickChip(el,name,inputId) {
  document.querySelectorAll('.q-chip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById(inputId).value=name;
}
 
function populateLists() {
  const names=[...new Set(sessions.flatMap(s=>s.exercises.map(e=>e.name)))];
  document.getElementById('exDatalist').innerHTML=names.map(n=>`<option value="${n}">`).join('');
  document.getElementById('exDatalist2').innerHTML=[...new Set([...names,...COMMON])].map(n=>`<option value="${n}">`).join('');
}
 
function updateStreak() {
  const dates=sessions.map(s=>s.date).sort().reverse();
  let streak=0, d=new Date();
  for (const date of dates) {
    if(date===d.toLocaleDateString('fr-FR')){streak++;d.setDate(d.getDate()-1);}
    else if(streak===0){d.setDate(d.getDate()-1);if(date===d.toLocaleDateString('fr-FR')){streak++;d.setDate(d.getDate()-1);}else break;}
    else break;
  }
  document.getElementById('hdrStreak').textContent=streak>1?`🔥 ${streak} jours`:'';
}
 
function switchTab(tab,btn) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  btn.classList.add('active');
  if(tab==='templates') renderTemplates();
  if(tab==='history') renderHistory();
}
 
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)';
  setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(16px)'; },2200);
}
 
init();
</script>
</body>
