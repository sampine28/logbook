<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Logbook">
<title>Logbook</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

:root {
  --bg:      #141210;
  --surface: #1c1916;
  --surf2:   #242018;
  --border:  #2a2520;
  --border2: #332e28;
  --accent:  #f0c040;
  --text:    #e8dcc8;
  --muted:   #554e44;
  --muted2:  #7a6e5e;
  --danger:  #ff5540;
  --success: #6dcc7a;
  --warn:    #f0a030;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100dvh; overflow-x: hidden; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

/* ── CHRONO BAR ── */
#chrono-bar {
  position: sticky; top: 0; z-index: 70;
  background: var(--accent); color: #000;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 18px; max-height: 0; overflow: hidden;
  transition: max-height .28s ease, padding .28s ease;
}
#chrono-bar.on { max-height: 46px; padding: 11px 18px; }
#chrono-info { display: flex; align-items: baseline; gap: 8px; }
#chrono-time  { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; }
#chrono-exname { font-size: 11px; font-weight: 600; opacity: .65; }
#chrono-stop  { background: rgba(0,0,0,.15); border: none; border-radius: 6px; padding: 5px 12px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; color: #000; }

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 60;
  background: var(--bg); border-bottom: 1px solid var(--border);
  padding: 13px 18px 10px;
  display: flex; align-items: center; justify-content: space-between;
}
header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 27px; letter-spacing: 2px; color: var(--accent); }
.hdr-r { text-align: right; }
.hdr-date   { font-size: 12px; color: var(--muted2); }
.hdr-streak { font-size: 11px; color: var(--accent); font-weight: 600; min-height: 14px; }

/* ── NAV ── */
nav {
  display: flex; border-bottom: 1px solid var(--border);
  background: var(--bg); position: sticky; top: 52px; z-index: 50;
}
nav button {
  flex: 1; background: none; border: none; color: var(--muted2);
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
  padding: 11px 0; cursor: pointer; text-transform: uppercase; letter-spacing: .7px;
  border-bottom: 2px solid transparent; transition: color .15s, border-color .15s;
}
nav button.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── VIEWS ── */
.view { display: none; padding: 14px 14px 110px; }
.view.active { display: block; }

/* ── OVERLOAD BANNER ── */
.ob { border-radius: 10px; padding: 9px 12px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 9px; }
.ob.up    { background: rgba(240,192,64,.09);  border: 1px solid rgba(240,192,64,.25); color: var(--accent); }
.ob.ok    { background: rgba(109,204,122,.07); border: 1px solid rgba(109,204,122,.2); color: var(--success); }
.ob.first { background: rgba(240,160,48,.07);  border: 1px solid rgba(240,160,48,.2);  color: var(--warn); }
.ob-ico   { font-size: 15px; flex-shrink: 0; margin-top: 2px; }
.ob strong { display: block; font-size: 12px; font-weight: 700; }
.ob small  { font-size: 11px; opacity: .75; display: block; margin-top: 1px; }

/* ── EXERCISE CARD ── */
.ex-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 11px; overflow: hidden; }

.ex-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; cursor: pointer;
}
.ex-hdr-left { flex: 1; min-width: 0; }
.ex-name { font-weight: 600; font-size: 15px; color: var(--text); }
.ex-sub  { font-size: 11px; color: var(--muted2); margin-top: 2px; }
.ex-hdr-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

/* Timer button on exercise header */
.ex-timer-btn {
  width: 34px; height: 34px; border-radius: 9px;
  border: 1px solid var(--border2); background: none;
  color: var(--muted2); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s; flex-shrink: 0;
}
.ex-timer-btn:active { background: var(--surf2); color: var(--accent); }
.ex-timer-btn.running { border-color: var(--accent); color: var(--accent); background: rgba(240,192,64,.1); }

.ex-del  { background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; padding: 4px 6px; }
.ex-chev { color: var(--muted2); font-size: 20px; transition: transform .2s; display: inline-block; }
.ex-card.open .ex-chev { transform: rotate(90deg); }

/* ── SETS BODY ── */
.sets-body { display: none; padding: 0 14px 14px; }
.ex-card.open .sets-body { display: block; }

.col-lbls { display: grid; grid-template-columns: 24px 1fr 1fr 36px; gap: 6px; padding: 2px 0 6px; }
.col-lbl  { font-size: 10px; color: var(--muted2); text-align: center; text-transform: uppercase; letter-spacing: .5px; }
.set-row  { display: grid; grid-template-columns: 24px 1fr 1fr 36px; gap: 6px; align-items: center; padding: 5px 0; border-top: 1px solid var(--border); }
.set-n    { font-size: 11px; color: var(--muted2); text-align: center; font-weight: 500; }

/* ── STEPPER ── */
.stpr { display: flex; align-items: center; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; height: 40px; }
.stpr-btn { background: none; border: none; color: var(--text); font-size: 22px; font-weight: 300; width: 36px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; flex-shrink: 0; }
.stpr-btn:active { background: var(--surf2); }
.stpr-in  { flex: 1; text-align: center; font-size: 15px; font-weight: 600; color: var(--text); border: none; background: none; height: 40px; padding: 0; width: 100%; }
.stpr-in:focus { outline: none; color: var(--accent); }
.prev-hint { font-size: 10px; color: var(--muted); text-align: center; margin-top: 2px; }

/* ── DONE BTN ── */
.done-btn { width: 34px; height: 34px; border-radius: 8px; border: 2px solid var(--border2); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; color: transparent; margin: 0 auto; transition: all .12s; }
.done-btn.done { background: var(--accent); border-color: var(--accent); color: #000; }

/* ── ADD SET ROW ── */
.add-set-row { display: flex; gap: 8px; margin-top: 10px; }
.add-set-btn { flex: 1; background: none; border: 1px dashed var(--border2); border-radius: 8px; color: var(--muted2); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 9px; cursor: pointer; }
.add-set-btn:active { border-color: var(--accent); color: var(--accent); }
.del-set-btn { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted2); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 9px 14px; cursor: pointer; }

/* ── FAB ── */
.fab-area { position: fixed; bottom: 0; left: 0; right: 0; padding: 10px 14px 30px; background: linear-gradient(to top, var(--bg) 60%, transparent); display: flex; gap: 10px; }
.fab { flex: 1; border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; padding: 15px; cursor: pointer; transition: transform .1s; }
.fab:active { transform: scale(.97); }
.fab-p { background: var(--accent); color: #000; }
.fab-s { background: var(--surface); color: var(--text); border: 1px solid var(--border2); }

/* ── MODALS ── */
.modal-ov { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,.8); backdrop-filter: blur(6px); align-items: flex-end; }
.modal-ov.open { display: flex; }
.modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 22px 16px 40px; width: 100%; border-top: 1px solid var(--border2); animation: slideUp .22s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal h3 { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1.5px; color: var(--accent); margin-bottom: 14px; }
.modal input { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 12px 14px; margin-bottom: 10px; }
.modal input:focus { outline: none; border-color: var(--accent); }
.quick-grid { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 12px; }
.q-chip { background: var(--surf2); border: 1px solid var(--border2); border-radius: 20px; padding: 6px 13px; font-size: 12px; color: var(--text); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .12s; }
.q-chip.sel, .q-chip:active { background: var(--accent); color: #000; border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; margin-top: 4px; }

/* ── CHRONO PICKER ── */
.chrono-opts { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.c-opt { background: var(--surf2); border: 1px solid var(--border2); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; padding: 12px 8px; cursor: pointer; text-align: center; transition: all .12s; }
.c-opt.sel { background: var(--accent); color: #000; border-color: var(--accent); }

/* ── HISTORY ── */
.h-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
.h-card-hdr { padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.h-card-date { font-weight: 600; font-size: 14px; color: var(--text); }
.h-card-meta { font-size: 11px; color: var(--muted2); }
.h-card-body { display: none; padding: 10px 14px 14px; border-top: 1px solid var(--border); }
.h-card.open .h-card-body { display: block; }
.h-ex { margin-bottom: 12px; }
.h-ex-name { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; }
.h-set { font-size: 13px; color: var(--muted2); margin: 3px 0; display: flex; align-items: center; gap: 6px; }
.h-set b { color: var(--text); }
.pr-tag { background: var(--accent); color: #000; font-size: 9px; font-weight: 800; padding: 2px 5px; border-radius: 4px; letter-spacing: .5px; }
.h-del-btn { margin-top: 8px; background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted2); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 6px 12px; cursor: pointer; }

/* ── STATS ── */
.stats-sel { width: 100%; background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 12px 14px; margin-bottom: 16px; appearance: none; }
.stats-sel:focus { outline: none; border-color: var(--accent); }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat-tile { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
.stat-lbl { font-size: 10px; color: var(--muted2); text-transform: uppercase; letter-spacing: .8px; }
.stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--accent); line-height: 1.1; }
.stat-val small { font-size: 15px; }
.stat-sub { font-size: 11px; color: var(--muted2); margin-top: 2px; }
.prog-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
.prog-ttl { font-size: 11px; color: var(--muted2); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 12px; }
.prog-row { display: flex; align-items: center; gap: 10px; padding: 5px 0; border-top: 1px solid var(--border); }
.prog-date { font-size: 11px; color: var(--muted2); width: 76px; flex-shrink: 0; }
.prog-bar-w { flex: 1; height: 5px; background: var(--border2); border-radius: 3px; overflow: hidden; }
.prog-bar { height: 100%; background: var(--accent); border-radius: 3px; }
.prog-v { font-size: 12px; font-weight: 600; color: var(--text); width: 52px; text-align: right; flex-shrink: 0; }

/* ── MISC ── */
.empty { text-align: center; padding: 50px 20px; color: var(--muted2); font-size: 14px; }
.empty .ico { font-size: 36px; margin-bottom: 10px; }
#toast { position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--accent); color: #000; font-weight: 700; font-size: 13px; padding: 10px 22px; border-radius: 22px; opacity: 0; transition: all .25s; z-index: 300; pointer-events: none; white-space: nowrap; }
</style>
</head>
<body>

<!-- CHRONO BAR (sticky, above header when visible) -->
<div id="chrono-bar">
  <div id="chrono-info">
    <div id="chrono-time">1:30</div>
    <div id="chrono-exname"></div>
  </div>
  <button id="chrono-stop" onclick="stopChrono()">Stop</button>
</div>

<header>
  <h1>LOGBOOK</h1>
  <div class="hdr-r">
    <div class="hdr-date" id="hdrDate"></div>
    <div class="hdr-streak" id="hdrStreak"></div>
  </div>
</header>

<nav>
  <button class="active" onclick="switchTab('session',this)">Session</button>
  <button onclick="switchTab('history',this)">Historique</button>
  <button onclick="switchTab('stats',this)">Stats</button>
</nav>

<!-- SESSION -->
<div class="view active" id="view-session">
  <div id="exList"></div>
  <div class="fab-area">
    <button class="fab fab-s" onclick="openAddEx()">+ Exercice</button>
    <button class="fab fab-p" onclick="saveSession()">Sauvegarder ✓</button>
  </div>
</div>

<!-- HISTORY -->
<div class="view" id="view-history">
  <div id="historyList"></div>
</div>

<!-- STATS -->
<div class="view" id="view-stats">
  <select class="stats-sel" id="statsSelect" onchange="renderStats()">
    <option value="">Choisir un exercice…</option>
  </select>
  <div id="statsContent"></div>
</div>

<!-- MODAL : add exercise -->
<div class="modal-ov" id="modalAddEx" onclick="maybeClose(event,'modalAddEx')">
  <div class="modal">
    <h3>Ajouter un exercice</h3>
    <div class="quick-grid" id="quickGrid"></div>
    <input type="text" id="exNameIn" placeholder="Ou saisir un nom…" autocomplete="off" list="exDatalist">
    <datalist id="exDatalist"></datalist>
    <input type="number" id="exSetsIn" placeholder="Nombre de séries (défaut : 3)" inputmode="numeric" min="1" max="10">
    <div class="modal-btns">
      <button class="fab fab-s" style="padding:13px" onclick="closeModal('modalAddEx')">Annuler</button>
      <button class="fab fab-p" style="padding:13px" onclick="confirmAddEx()">Ajouter</button>
    </div>
  </div>
</div>

<!-- MODAL : chrono picker -->
<div class="modal-ov" id="modalChrono" onclick="maybeClose(event,'modalChrono')">
  <div class="modal">
    <h3 id="chronoModalTitle">Temps de repos</h3>
    <div class="chrono-opts">
      <div class="c-opt" onclick="pickDur(60,this)">1 min</div>
      <div class="c-opt sel" onclick="pickDur(90,this)">1:30</div>
      <div class="c-opt" onclick="pickDur(120,this)">2 min</div>
      <div class="c-opt" onclick="pickDur(180,this)">3 min</div>
    </div>
    <button class="fab fab-p" style="width:100%;padding:15px" onclick="launchChrono()">Lancer le chrono</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const W_STEP = 2.5, R_STEP = 1, TARGET_REPS = 12;
const COMMON = ['Développé couché','Squat','Soulevé de terre','Tractions','Rowing barre','OHP','Curl biceps','Triceps poulie','Leg press','Fentes','Développé incliné','Pec deck','Hip thrust','Romanian deadlift'];

// ── STATE ───────────────────────────────────────────────────────────────────
let sessions = JSON.parse(localStorage.getItem('lb_v3') || '[]');
let cur = null;
let chronoDur = 90, chronoRemain = 0, chronoTimer = null, chronoExName = '';

function save() { localStorage.setItem('lb_v3', JSON.stringify(sessions)); }
function todayStr() { return new Date().toLocaleDateString('fr-FR'); }
function norm(s) { return (s||'').trim().toLowerCase(); }

function init() {
  document.getElementById('hdrDate').textContent = todayStr();
  updateStreak();
  const ex = sessions.find(s => s.date === todayStr());
  cur = ex ? JSON.parse(JSON.stringify(ex)) : { date: todayStr(), exercises: [] };
  renderSession();
  populateLists();
}

// ── OVERLOAD LOGIC ───────────────────────────────────────────────────────────
function lastEx(name) {
  for (const s of sessions) {
    if (s.date === todayStr()) continue;
    const ex = s.exercises.find(e => norm(e.name) === norm(name));
    if (ex) return ex;
  }
  return null;
}

function advice(name) {
  const last = lastEx(name);
  if (!last) return { type:'first', title:'Premier enregistrement', detail:'Note tes séries pour démarrer ta progression !' };
  const validSets = last.sets.filter(s => s.reps > 0);
  const avgR = validSets.length ? validSets.reduce((a,s)=>a+(s.reps||0),0) / validSets.length : 0;
  const maxW = Math.max(...last.sets.map(s=>s.weight||0));
  if (avgR >= TARGET_REPS) {
    return { type:'up', title:`↑ Augmente · essaie ${maxW + W_STEP} kg`, detail:`Moy. ${Math.round(avgR)} reps la dernière fois — tu es prêt à charger !`, targetW: maxW + W_STEP, targetR: Math.max(6, Math.round(avgR) - 2) };
  }
  return { type:'ok', title:`→ Même poids, vise ${Math.min(TARGET_REPS, Math.round(avgR) + 1)} reps`, detail:`Dernière fois : ${maxW} kg × ${Math.round(avgR)} reps en moy.`, targetW: maxW, targetR: Math.min(TARGET_REPS, Math.round(avgR) + 1) };
}

// ── RENDER SESSION ───────────────────────────────────────────────────────────
function renderSession() {
  const el = document.getElementById('exList');
  if (!cur.exercises.length) {
    el.innerHTML = `<div class="empty"><div class="ico">💪</div>Ajoute ton premier exercice !</div>`;
    return;
  }
  el.innerHTML = cur.exercises.map((ex,ei) => buildCard(ex,ei)).join('');
}

function buildCard(ex, ei) {
  const adv = advice(ex.name);
  const done = ex.sets.filter(s=>s.done).length;
  const lastSets = lastEx(ex.name)?.sets || [];
  const isRunning = chronoTimer && chronoExName === ex.name;

  const banner = `<div class="ob ${adv.type}">
    <div class="ob-ico">${adv.type==='up'?'🔼':adv.type==='ok'?'✅':'🆕'}</div>
    <div><strong>${adv.title}</strong><small>${adv.detail}</small></div>
  </div>`;

  const rows = ex.sets.map((s,si) => {
    const prev = lastSets[si];
    return `<div class="set-row" id="sr-${ei}-${si}">
      <div class="set-n">${si+1}</div>
      <div>
        <div class="stpr">
          <button class="stpr-btn" onclick="adj(${ei},${si},'w',-1)">−</button>
          <input class="stpr-in" type="number" inputmode="decimal" value="${s.weight||0}"
            onchange="setV(${ei},${si},'w',+this.value)" onfocus="this.select()">
          <button class="stpr-btn" onclick="adj(${ei},${si},'w',+1)">+</button>
        </div>
        ${prev?`<div class="prev-hint">${prev.weight} kg</div>`:''}
      </div>
      <div>
        <div class="stpr">
          <button class="stpr-btn" onclick="adj(${ei},${si},'r',-1)">−</button>
          <input class="stpr-in" type="number" inputmode="numeric" value="${s.reps||0}"
            onchange="setV(${ei},${si},'r',+this.value)" onfocus="this.select()">
          <button class="stpr-btn" onclick="adj(${ei},${si},'r',+1)">+</button>
        </div>
        ${prev?`<div class="prev-hint">${prev.reps} reps</div>`:''}
      </div>
      <button class="done-btn ${s.done?'done':''}" onclick="toggleDone(${ei},${si})">✓</button>
    </div>`;
  }).join('');

  return `<div class="ex-card ${ex.open!==false?'open':''}" id="ec-${ei}">
    <div class="ex-hdr" onclick="togEx(${ei})">
      <div class="ex-hdr-left">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-sub">${done}/${ex.sets.length} séries · ${bestStr(ex)}</div>
      </div>
      <div class="ex-hdr-right">
        <button class="ex-timer-btn ${isRunning?'running':''}" id="tb-${ei}"
          onclick="event.stopPropagation();openChrono('${ex.name.replace(/'/g,"\\'")}')" title="Chrono repos">⏱</button>
        <button class="ex-del" onclick="event.stopPropagation();delEx(${ei})">✕</button>
        <span class="ex-chev">›</span>
      </div>
    </div>
    <div class="sets-body">
      ${banner}
      <div class="col-lbls">
        <div class="col-lbl"></div>
        <div class="col-lbl">Kg</div>
        <div class="col-lbl">Reps</div>
        <div class="col-lbl">✓</div>
      </div>
      ${rows}
      <div class="add-set-row">
        <button class="add-set-btn" onclick="addSet(${ei})">+ Série</button>
        <button class="del-set-btn" onclick="delSet(${ei})">−</button>
      </div>
    </div>
  </div>`;
}

function bestStr(ex) {
  const s = ex.sets.filter(s=>s.weight||s.reps);
  if (!s.length) return '—';
  const b = s.reduce((a,b)=>((a.weight||0)*(a.reps||0)>(b.weight||0)*(b.reps||0)?a:b));
  return `${b.weight||0} kg × ${b.reps||0} reps`;
}

function togEx(ei) {
  const card = document.getElementById(`ec-${ei}`);
  card.classList.toggle('open');
  cur.exercises[ei].open = card.classList.contains('open');
}

function adj(ei, si, field, dir) {
  const step = field==='w'?W_STEP:R_STEP;
  const key  = field==='w'?'weight':'reps';
  const val  = Math.max(0, Math.round(((cur.exercises[ei].sets[si][key]||0)+dir*step)*10)/10);
  cur.exercises[ei].sets[si][key] = val;
  document.getElementById(`sr-${ei}-${si}`).querySelectorAll('.stpr-in')[field==='w'?0:1].value = val;
  refreshSub(ei);
}

function setV(ei, si, field, val) {
  cur.exercises[ei].sets[si][field==='w'?'weight':'reps'] = Math.max(0, val);
  refreshSub(ei);
}

function refreshSub(ei) {
  const ex = cur.exercises[ei];
  const done = ex.sets.filter(s=>s.done).length;
  document.querySelector(`#ec-${ei} .ex-sub`).textContent = `${done}/${ex.sets.length} séries · ${bestStr(ex)}`;
}

function toggleDone(ei, si) {
  cur.exercises[ei].sets[si].done = !cur.exercises[ei].sets[si].done;
  document.querySelector(`#sr-${ei}-${si} .done-btn`).classList.toggle('done', cur.exercises[ei].sets[si].done);
  refreshSub(ei);
  if (navigator.vibrate) navigator.vibrate(25);
}

function addSet(ei) {
  const s = cur.exercises[ei].sets;
  s.push(s.length?{...s[s.length-1],done:false}:{weight:0,reps:0,done:false});
  const open = document.getElementById(`ec-${ei}`).classList.contains('open');
  renderSession();
  if (open) document.getElementById(`ec-${ei}`)?.classList.add('open');
}

function delSet(ei) {
  if (cur.exercises[ei].sets.length > 1) {
    cur.exercises[ei].sets.pop();
    const open = document.getElementById(`ec-${ei}`).classList.contains('open');
    renderSession();
    if (open) document.getElementById(`ec-${ei}`)?.classList.add('open');
  }
}

function delEx(ei) { cur.exercises.splice(ei,1); renderSession(); }

// ── SAVE ─────────────────────────────────────────────────────────────────────
function saveSession() {
  const idx = sessions.findIndex(s=>s.date===cur.date);
  const copy = JSON.parse(JSON.stringify(cur));
  if (idx!==-1) sessions[idx]=copy; else sessions.unshift(copy);
  save(); populateLists(); updateStreak();
  showToast('✓ Session sauvegardée');
}

// ── ADD EXERCISE ──────────────────────────────────────────────────────────────
function openAddEx() {
  document.getElementById('exNameIn').value='';
  document.getElementById('exSetsIn').value='';
  const used = new Set(cur.exercises.map(e=>norm(e.name)));
  const hist = [...new Set(sessions.flatMap(s=>s.exercises.map(e=>e.name)))];
  const chips = [...new Set([...hist,...COMMON])].filter(n=>!used.has(norm(n))).slice(0,12);
  document.getElementById('quickGrid').innerHTML = chips.map(n=>
    `<div class="q-chip" onclick="pickChip(this,'${n.replace(/'/g,"\\'")}')"> ${n}</div>`
  ).join('');
  openModal('modalAddEx');
}

function pickChip(el, name) {
  document.querySelectorAll('.q-chip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('exNameIn').value = name;
}

function confirmAddEx() {
  const name = document.getElementById('exNameIn').value.trim();
  if (!name) { document.getElementById('exNameIn').focus(); return; }
  const n = parseInt(document.getElementById('exSetsIn').value)||3;
  const adv = advice(name);
  const last = lastEx(name)?.sets||[];
  const sets = [];
  for (let i=0;i<n;i++) {
    let w=0,r=0;
    if(adv.targetW!==undefined){w=adv.targetW;r=adv.targetR||0;}
    else if(last[i]){w=last[i].weight;r=last[i].reps;}
    sets.push({weight:w,reps:r,done:false});
  }
  cur.exercises.push({name,sets,open:true});
  closeModal('modalAddEx'); renderSession();
}

// ── CHRONO ───────────────────────────────────────────────────────────────────
function openChrono(exName) {
  chronoExName = exName;
  document.getElementById('chronoModalTitle').textContent = `Repos — ${exName}`;
  openModal('modalChrono');
}

function pickDur(sec, el) {
  chronoDur = sec;
  document.querySelectorAll('.c-opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
}

function launchChrono() {
  closeModal('modalChrono');
  if (chronoTimer) clearInterval(chronoTimer);
  chronoRemain = chronoDur;
  document.getElementById('chrono-bar').classList.add('on');
  document.getElementById('chrono-exname').textContent = chronoExName;
  updateChronoDom();
  // highlight running timer button
  document.querySelectorAll('.ex-timer-btn').forEach(b=>b.classList.remove('running'));
  cur.exercises.forEach((ex,ei)=>{ if(ex.name===chronoExName) document.getElementById(`tb-${ei}`)?.classList.add('running'); });

  chronoTimer = setInterval(()=>{
    chronoRemain--;
    if (chronoRemain <= 0) {
      stopChrono();
      if (navigator.vibrate) navigator.vibrate([100,50,100,50,200]);
      showToast('💪 C\'est parti !');
    } else {
      updateChronoDom();
    }
  }, 1000);
}

function updateChronoDom() {
  const m = Math.floor(chronoRemain/60);
  const s = chronoRemain % 60;
  document.getElementById('chrono-time').textContent = `${m}:${String(s).padStart(2,'0')}`;
}

function stopChrono() {
  if (chronoTimer) { clearInterval(chronoTimer); chronoTimer=null; }
  document.getElementById('chrono-bar').classList.remove('on');
  document.querySelectorAll('.ex-timer-btn').forEach(b=>b.classList.remove('running'));
}

// ── HISTORY ──────────────────────────────────────────────────────────────────
function renderHistory() {
  const el = document.getElementById('historyList');
  if (!sessions.length) { el.innerHTML=`<div class="empty"><div class="ico">📋</div>Aucune session encore.</div>`; return; }
  el.innerHTML = sessions.map((s,si)=>`
    <div class="h-card" id="hc-${si}">
      <div class="h-card-hdr" onclick="togHC(${si})">
        <div class="h-card-date">${s.date}</div>
        <div class="h-card-meta">${s.exercises.length} exercice${s.exercises.length>1?'s':''} · ${totVol(s)} kg vol.</div>
      </div>
      <div class="h-card-body">
        ${s.exercises.map(ex=>`
          <div class="h-ex">
            <div class="h-ex-name">${ex.name}</div>
            ${ex.sets.map(st=>{
              const pr=isPR(ex.name,st,s.date);
              return `<div class="h-set"><b>${st.weight||0} kg × ${st.reps||0}</b>${pr?'<span class="pr-tag">PR</span>':''}</div>`;
            }).join('')}
          </div>`).join('')}
        <button class="h-del-btn" onclick="delSess(${si})">Supprimer</button>
      </div>
    </div>`).join('');
}

function togHC(i) { document.getElementById(`hc-${i}`).classList.toggle('open'); }

function delSess(i) { sessions.splice(i,1); save(); renderHistory(); populateLists(); updateStreak(); }

function totVol(s) { return Math.round(s.exercises.reduce((a,ex)=>a+ex.sets.reduce((b,st)=>b+(st.weight||0)*(st.reps||0),0),0)); }

function isPR(name,set,date) {
  const vol=(set.weight||0)*(set.reps||0);
  if (!vol) return false;
  for (const s of sessions) {
    if (s.date===date) continue;
    for (const ex of s.exercises) {
      if (norm(ex.name)===norm(name)) {
        for (const st of ex.sets) { if((st.weight||0)*(st.reps||0)>=vol) return false; }
      }
    }
  }
  return true;
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function renderStats() {
  const name = document.getElementById('statsSelect').value;
  const cont = document.getElementById('statsContent');
  if (!name) { cont.innerHTML=''; return; }

  const entries=[];
  for (const s of [...sessions].reverse()) {
    const ex=s.exercises.find(e=>norm(e.name)===norm(name));
    if(!ex) continue;
    const maxW=Math.max(...ex.sets.map(s=>s.weight||0));
    const totV=ex.sets.reduce((a,s)=>a+(s.weight||0)*(s.reps||0),0);
    entries.push({date:s.date,maxW,totV});
  }
  if (!entries.length) { cont.innerHTML=`<div class="empty" style="padding:30px 0">Aucune donnée.</div>`; return; }

  const bestW = Math.max(...entries.map(e=>e.maxW));
  const last  = entries[entries.length-1];
  const prev  = entries[entries.length-2];
  const delta = prev ? last.maxW - prev.maxW : 0;
  const totalSessions = entries.length;

  cont.innerHTML=`
    <div class="stat-grid">
      <div class="stat-tile">
        <div class="stat-lbl">Record charge</div>
        <div class="stat-val">${bestW}<small> kg</small></div>
        <div class="stat-sub">All time</div>
      </div>
      <div class="stat-tile">
        <div class="stat-lbl">Tendance</div>
        <div class="stat-val" style="color:${delta>=0?'var(--success)':'var(--danger)'}">
          ${delta>0?'+':''}${delta}<small> kg</small>
        </div>
        <div class="stat-sub">vs session préc.</div>
      </div>
      <div class="stat-tile">
        <div class="stat-lbl">Sessions</div>
        <div class="stat-val">${totalSessions}</div>
        <div class="stat-sub">enregistrées</div>
      </div>
      <div class="stat-tile">
        <div class="stat-lbl">Dernier vol.</div>
        <div class="stat-val">${Math.round(last.totV)}<small> kg</small></div>
        <div class="stat-sub">volume total</div>
      </div>
    </div>
    <div class="prog-card">
      <div class="prog-ttl">Progression — charge max par session</div>
      ${entries.map(e=>`
        <div class="prog-row">
          <div class="prog-date">${e.date}</div>
          <div class="prog-bar-w"><div class="prog-bar" style="width:${bestW?Math.round(e.maxW/bestW*100):0}%"></div></div>
          <div class="prog-v">${e.maxW} kg</div>
        </div>`).join('')}
    </div>`;
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function populateLists() {
  const names=[...new Set(sessions.flatMap(s=>s.exercises.map(e=>e.name)))];
  document.getElementById('exDatalist').innerHTML=names.map(n=>`<option value="${n}">`).join('');
  const sel=document.getElementById('statsSelect'), prev=sel.value;
  sel.innerHTML='<option value="">Choisir un exercice…</option>'+
    names.map(n=>`<option ${n===prev?'selected':''} value="${n}">${n}</option>`).join('');
}

function updateStreak() {
  const dates=sessions.map(s=>s.date).sort().reverse();
  let streak=0, d=new Date();
  for (const date of dates) {
    if(date===d.toLocaleDateString('fr-FR')){streak++;d.setDate(d.getDate()-1);}
    else if(streak===0){d.setDate(d.getDate()-1);if(date===d.toLocaleDateString('fr-FR')){streak++;d.setDate(d.getDate()-1);}else break;}
    else break;
  }
  document.getElementById('hdrStreak').textContent=streak>1?`🔥 ${streak} jours`:'';
}

function switchTab(tab,btn) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  btn.classList.add('active');
  if(tab==='history') renderHistory();
  if(tab==='stats') { populateLists(); renderStats(); }
}

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function maybeClose(e,id) { if(e.target===document.getElementById(id)) closeModal(id); }

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)';
  setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(16px)'; },2200);
}

init();
</script>
